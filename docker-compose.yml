services:
  db:
    image: postgres:latest
    container_name: timbas-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-timbas_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timbas_pgdata:/var/lib/postgresql

volumes:
  timbas_pgdata:
